<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة الشهادة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap');

        body {
            font-family: 'Tajawal', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #e5e7eb;
            /* Gray background for preview */
        }

        /* Print styles */
        @media print {
            body {
                background: white;
            }

            .no-print {
                display: none !important;
            }

            .canvas-page {
                box-shadow: none !important;
                margin: 0 !important;
                border: none !important;
                page-break-after: always;
            }
        }

        /* Container for pages */
        #pages-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }

        /* Replicating Editor CSS */
        .canvas-page {
            width: 210mm;
            height: 297mm;
            background: white;
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin: auto;
        }

        .draggable-element {
            position: absolute;
            box-sizing: border-box;
            /* Border is transparent in print unless specific shape */
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Default centering matches editor slightly differently but ok */
        }

        .draggable-element .text-content {
            width: 100%;
            height: 100%;
            white-space: pre-wrap;
            /* Preserve formatting */
            overflow: hidden;
        }

        /* .shape-element { styles for shapes if any } */

        /* Loading & Error */
        .message-box {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #333;
        }

        .print-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .print-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <button class="print-btn no-print" onclick="window.print()">🖨️ طباعة</button>

    <div id="loading" class="message-box">
        <div>جاري تحميل البيانات والقالب...</div>
    </div>

    <div id="pages-container"></div>

    <script type="module">
        import { FirebaseService } from '../js/firebase-config.js';
        import { DEFAULT_TEMPLATES } from '../../js/default-templates.js';

        const urlParams = new URLSearchParams(window.location.search);
        const certificateId = urlParams.get('id');

        async function init() {
            if (!certificateId) {
                showError('معرف الشهادة مفقود');
                return;
            }

            try {
                // 1. Fetch Certificate Data
                const certificates = await FirebaseService.getNegativeCertificates();
                const certificate = certificates.find(c => c.id === certificateId);

                if (!certificate) {
                    showError('الشهادة غير موجودة');
                    return;
                }

                // 2. Fetch Template (Try localStorage first, then Default)
                let templateState = null;
                const localTemplate = localStorage.getItem('templateEditor_advanced');

                if (localTemplate) {
                    try {
                        templateState = JSON.parse(localTemplate);
                    } catch (e) {
                        console.error('Error parsing local template', e);
                    }
                }

                // Fallback to Default Template if no local save found
                if (!templateState || !templateState.pages || templateState.pages.length === 0) {
                    console.log('Using DEFAULT certificate template.');
                    templateState = DEFAULT_TEMPLATES.certificate;
                }

                // 3. Render
                renderTemplate(templateState, certificate);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                showError('حدث خطأ أثناء المعالجة: ' + error.message);
            }
        }

        function showError(msg) {
            const el = document.getElementById('loading');
            el.innerHTML = `<div style="color: red;">${msg}</div>`;
        }

        function renderTemplate(state, data) {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';

            state.pages.forEach(pageState => {
                const pageEl = document.createElement('div');
                pageEl.className = 'canvas-page';

                pageState.elements.forEach(elData => {
                    const el = document.createElement('div');
                    el.className = 'draggable-element';

                    // Style: Position & Size
                    el.style.left = (elData.x || 0) + 'px';
                    el.style.top = (elData.y || 0) + 'px';

                    // Width/Height might be in style object or direct properties depending on version
                    if (elData.style) {
                        el.style.width = elData.style.width;
                        el.style.height = elData.style.height;
                        // Borders and backgrounds if saved in style (advanced editor usually saves these)
                        // Note: The provided editor js creates elements with specific classes/styles.
                        // We rely on the stored HTML content mostly for text.
                    }

                    // Content
                    if (elData.html) {
                        // Inject HTML (text content)
                        // We need to perform variable substitution on the HTML string
                        let contentHtml = elData.html;
                        contentHtml = replaceVariables(contentHtml, data);
                        el.innerHTML = contentHtml;
                    }

                    // Specific styling reconstruction if needed (like borders for shapes)
                    // The editor exports 'html' which usually contains the inner structure.
                    // The outer div 'draggable-element' needs the position.

                    // Rotations? The editor js snippet didn't show rotation in 'captureState' clearly 
                    // (it showed rotation input in HTML but captureState gathered x,y,w,h). 
                    // If rotation is saved, apply it.
                    // Checking captureState in previous file: it saves x, y, style(w,h), html.

                    pageEl.appendChild(el);
                });

                container.appendChild(pageEl);
            });
        }

        function replaceVariables(html, data) {
            // Map of variables
            const vars = {
                '{{lastname}}': data.owner_lastname || '',
                '{{firstname}}': data.owner_firstname || '',
                '{{father}}': data.owner_father || '',
                '{{birthdate}}': data.owner_birthdate || '',
                '{{birthplace}}': data.owner_birthplace || '',
                '{{phone}}': data.phone || '',
                '{{email}}': data.email || '',
                '{{id}}': data.id || '',
                '{{date}}': new Date().toLocaleDateString('ar-DZ'),
                '{{status}}': data.status || '',

                // Arabic placeholders
                '{{اللقب}}': data.owner_lastname || '',
                '{{الاسم}}': data.owner_firstname || '',
                '{{اسم_الاب}}': data.owner_father || '',
                '{{تاريخ_الميلاد}}': data.owner_birthdate || '',
                '{{مكان_الميلاد}}': data.owner_birthplace || ''
            };

            let text = html;
            for (const [key, val] of Object.entries(vars)) {
                // Global replacement
                text = text.replace(new RegExp(key, 'g'), val);
            }
            return text;
        }

        init();
    </script>
</body>

</html>
