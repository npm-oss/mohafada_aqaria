<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة البطاقة العقارية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap');

        body {
            font-family: 'Tajawal', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #e5e7eb;
        }

        /* Print styles */
        @media print {
            body {
                background: white;
            }

            .no-print {
                display: none !important;
            }

            .canvas-page {
                box-shadow: none !important;
                margin: 0 !important;
                border: none !important;
                page-break-after: always;
            }
        }

        /* Container for pages */
        #pages-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }

        /* Replicating Editor CSS */
        .canvas-page {
            width: 210mm;
            height: 297mm;
            background: white;
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin: auto;
        }

        .draggable-element {
            position: absolute;
            box-sizing: border-box;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .draggable-element .text-content {
            width: 100%;
            height: 100%;
            white-space: pre-wrap;
            overflow: hidden;
        }

        /* Loading & Error */
        .message-box {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #333;
        }

        .print-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #059669;
            /* Green for Documents */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .print-btn:hover {
            background: #047857;
        }
    </style>
</head>

<body>

    <button class="print-btn no-print" onclick="window.print()">🖨️ طباعة</button>

    <div id="loading" class="message-box">
        <div>جاري تحميل البيانات والقالب...</div>
    </div>

    <div id="pages-container"></div>

    <script type="module">
        import { FirebaseService } from '../js/firebase-config.js';
        import { DEFAULT_TEMPLATES } from '../js/default-templates.js';

        const urlParams = new URLSearchParams(window.location.search);
        const documentId = urlParams.get('id');

        async function init() {
            if (!documentId) {
                showError('معرف البطاقة مفقود');
                return;
            }

            try {
                // 1. Fetch Document Data
                const documents = await FirebaseService.getDocumentRequests();
                const docData = documents.find(d => d.id === documentId);

                if (!docData) {
                    showError('البطاقة غير موجودة');
                    return;
                }

                if (docData.status !== 'approved') {
                    showError('لا يمكن طباعة بطاقة غير معتمدة');
                    return;
                }

                // 2. Fetch Template (Try Firebase -> localStorage -> Default)
                let templateState = null;

                // 2a. Try Firebase first (cloud-saved template)
                try {
                    const cloudTemplate = await FirebaseService.getTemplate('document');
                    if (cloudTemplate && cloudTemplate.pages && cloudTemplate.pages.length > 0) {
                        console.log('✅ Using cloud template from Firebase');
                        templateState = cloudTemplate;
                    }
                } catch (e) {
                    console.error('Failed to load from Firebase:', e);
                }

                // 2b. Try localStorage as fallback
                if (!templateState) {
                    const localTemplate = localStorage.getItem('templateEditor_advanced');
                    if (localTemplate) {
                        try {
                            templateState = JSON.parse(localTemplate);
                            console.log('✅ Using local template');
                        } catch (e) {
                            console.error('Error parsing local template', e);
                        }
                    }
                }

                // 2c. Fallback to Default Template
                if (!templateState || !templateState.pages || templateState.pages.length === 0) {
                    console.log('⚠️ Using DEFAULT document template.');
                    templateState = DEFAULT_TEMPLATES.document;
                }

                // 3. Render
                renderTemplate(templateState, docData);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                showError('حدث خطأ أثناء المعالجة: ' + error.message);
            }
        }

        function showError(msg) {
            const el = document.getElementById('loading');
            el.innerHTML = `<div style="color: red;">${msg}</div>`;
        }

        function renderTemplate(state, data) {
            const container = document.getElementById('pages-container');
            container.innerHTML = '';

            state.pages.forEach(pageState => {
                const pageEl = document.createElement('div');
                pageEl.className = 'canvas-page';

                pageState.elements.forEach(elData => {
                    const el = document.createElement('div');
                    el.className = 'draggable-element';

                    // Apply full CSS style string if available
                    if (elData.style) {
                        if (typeof elData.style === 'string') {
                            el.style.cssText = elData.style;
                        } else {
                            // Object format fallback
                            if (elData.style.width) el.style.width = elData.style.width;
                            if (elData.style.height) el.style.height = elData.style.height;
                        }
                    }

                    // Apply positioning using transform (matching editor behavior)
                    const x = parseFloat(elData.x) || 0;
                    const y = parseFloat(elData.y) || 0;
                    el.style.transform = `translate(${x}px, ${y}px)`;

                    // Content - strip out editor control buttons
                    if (elData.html) {
                        let contentHtml = elData.html;

                        // Remove .element-controls (duplicate/delete buttons)
                        contentHtml = contentHtml.replace(/<div class="element-controls">[\s\S]*?<\/div>/gi, '');

                        // Replace variables with actual data
                        contentHtml = replaceVariables(contentHtml, data);

                        el.innerHTML = contentHtml;
                    }

                    pageEl.appendChild(el);
                });

                container.appendChild(pageEl);
            });
        }

        function getCardTypeLabel(type) {
            const labels = {
                'personal': 'البطاقة الشخصية',
                'alphabetical': 'البطاقة الأبجدية',
                'urban': 'البطاقة الحضرية',
                'rural': 'البطاقة الريفية',
                'contract': 'مستخرج عقد'
            };
            return labels[type] || type;
        }

        function getPropertyStatusLabel(status) {
            const labels = {
                'surveyed': 'مسحي',
                'non_surveyed': 'غير مسحي',
                'rural': 'ريفي'
            };
            return labels[status] || status;
        }

        function replaceVariables(html, data) {
            const vars = {
                '{{applicant_lastname}}': data.applicant_lastname || '',
                '{{applicant_firstname}}': data.applicant_firstname || '',
                '{{applicant_phone}}': data.applicant_phone || '',
                '{{owner_lastname}}': data.owner_lastname || '',
                '{{owner_firstname}}': data.owner_firstname || '',
                '{{owner_father}}': data.owner_father || '',
                '{{owner_birthdate}}': data.owner_birthdate || '',
                '{{owner_birthplace}}': data.owner_birthplace || '',
                '{{card_type}}': getCardTypeLabel(data.card_type) || '',
                '{{municipality}}': data.municipality || '',
                '{{section}}': data.section || '',
                '{{plan_number}}': data.plan_number || '',
                '{{parcel_number}}': data.parcel_number || '',
                '{{request_id}}': data.id || '',
                '{{property_status}}': getPropertyStatusLabel(data.property_status) || '',
                '{{issue_date}}': new Date().toLocaleDateString('ar-DZ'),

                // Arabic placeholders (matching template-editor.js updates)
                '{{اللقب}}': data.owner_lastname || '',
                '{{الاسم}}': data.owner_firstname || '',
                '{{تاريخ_الميلاد}}': data.owner_birthdate || '',
                '{{مكان_الميلاد}}': data.owner_birthplace || '',
                '{{رقم_السند}}': data.plan_number || '',
                '{{الموقع}}': data.municipality || '',
                '{{المساحة}}': ''
            };

            let text = html;
            for (const [key, val] of Object.entries(vars)) {
                text = text.replace(new RegExp(key, 'g'), val);
            }
            return text;
        }

        init();
    </script>
</body>

</html>
