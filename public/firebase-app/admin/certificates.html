<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشهادات السلبية - المحافظة العقارية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon">🏛️</span>
            <span class="logo-text">المحافظة العقارية</span>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span>لوحة التحكم</span>
            </a>
            <a href="certificates.html" class="nav-item active">
                <span class="nav-icon">📜</span>
                <span>الشهادات السلبية</span>
            </a>
            <a href="documents.html" class="nav-item">
                <span class="nav-icon">📄</span>
                <span>طلبات الوثائق</span>
            </a>
            <a href="messages.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>الرسائل</span>
            </a>
            <a href="template-editor.html" class="nav-item">
                <span class="nav-icon">🎨</span>
                <span>محرر القوالب</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="logout-btn" onclick="handleLogout()">
                <span>🚪</span>
                <span>تسجيل الخروج</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>📜 الشهادات السلبية</h1>
            <div class="user-info">
                <span class="user-avatar">👨‍💼</span>
                <span class="user-name" id="userName">المدير</span>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- Filters -->
            <div class="filters-bar">
                <select id="statusFilter" onchange="filterData()">
                    <option value="">كل الحالات</option>
                    <option value="pending">قيد الانتظار</option>
                    <option value="approved">تمت الموافقة</option>
                    <option value="rejected">مرفوض</option>
                    <option value="extracted">تم الاستخراج</option>
                </select>
                <select id="municipalityFilter" onchange="filterData()">
                    <option value="">كل المناطق (مكان الميلاد)</option>
                    <!-- Populated dynamically -->
                </select>
                <input type="date" id="dateFilter" onchange="filterData()" placeholder="تاريخ">
                <input type="text" id="searchInput" placeholder="🔍 بحث (الاسم، اللقب)..." onkeyup="filterData()">
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>قائمة الطلبات</h2>
                    <span class="total-count" id="totalCount">0 طلب</span>
                </div>
                <div class="card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>صاحب الشهادة</th>
                                <th>مكان الميلاد</th>
                                <th>النوع</th>
                                <th>الحالة</th>
                                <th>التاريخ</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="certificatesTable">
                            <tr>
                                <td colspan="7" class="loading-cell">
                                    <div class="loading-spinner"></div>
                                    جاري التحميل...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="editModal" class="modal-overlay" onclick="closeModal(event)">
            <div class="modal">
                <div class="modal-header">
                    <h2>تعديل الطلب</h2>
                    <button class="close-modal" onclick="closeModal()">×</button>
                </div>
                <div class="modal-body">
                    <form id="editForm" onsubmit="saveCertificate(event)">
                        <input type="hidden" id="edit_id">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>اللقب</label>
                                <input type="text" id="edit_owner_lastname" required>
                            </div>
                            <div class="form-group">
                                <label>الاسم</label>
                                <input type="text" id="edit_owner_firstname" required>
                            </div>
                            <div class="form-group">
                                <label>اسم الأب</label>
                                <input type="text" id="edit_owner_father">
                            </div>
                            <div class="form-group">
                                <label>تاريخ الميلاد</label>
                                <input type="date" id="edit_owner_birthdate">
                            </div>
                            <div class="form-group">
                                <label>مكان الميلاد</label>
                                <input type="text" id="edit_owner_birthplace">
                            </div>
                            <div class="form-group">
                                <label>رقم الهاتف</label>
                                <input type="text" id="edit_phone" dir="ltr">
                            </div>
                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" id="edit_email">
                            </div>
                            <div class="form-group">
                                <label>حالة الطلب</label>
                                <select id="edit_status">
                                    <option value="pending">قيد الانتظار</option>
                                    <option value="approved">تمت الموافقة</option>
                                    <option value="rejected">مرفوض</option>
                                    <option value="extracted">تم الاستخراج</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions" style="margin-top: 20px; display: flex; gap: 10px;">
                            <button type="submit" class="btn btn-primary"
                                style="flex: 1; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px;">حفظ
                                التعديلات</button>
                            <button type="button" onclick="closeModal()" class="btn"
                                style="flex: 1; padding: 10px; background: #e5e7eb; border: none; border-radius: 4px;">إلغاء</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { FirebaseService } from '../js/firebase-config.js';

        let allCertificates = [];

        FirebaseService.onAuthChange((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userName').textContent = user.email.split('@')[0];
                loadCertificates();
            }
        });

        async function loadCertificates() {
            allCertificates = await FirebaseService.getNegativeCertificates();
            populateMunicipalities();
            displayCertificates(allCertificates);
        }

        function populateMunicipalities() {
            const select = document.getElementById('municipalityFilter');
            const places = [...new Set(allCertificates.map(c => c.owner_birthplace).filter(Boolean))].sort();
            select.innerHTML = '<option value="">كل المناطق (مكان الميلاد)</option>' +
                places.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        window.filterData = function () {
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const date = document.getElementById('dateFilter').value;
            const municipality = document.getElementById('municipalityFilter').value;

            let filtered = allCertificates;

            if (status) filtered = filtered.filter(c => c.status === status);

            if (date) {
                filtered = filtered.filter(c => c.created_at && c.created_at.startsWith(date));
            }

            if (municipality) {
                filtered = filtered.filter(c => (c.owner_birthplace || '') === municipality);
            }

            if (search) {
                filtered = filtered.filter(c =>
                    (c.owner_lastname || '').toLowerCase().includes(search) ||
                    (c.owner_firstname || '').toLowerCase().includes(search) ||
                    (c.applicant_lastname || '').toLowerCase().includes(search)
                );
            }

            displayCertificates(filtered);
        };

        function displayCertificates(certificates) {
            const tbody = document.getElementById('certificatesTable');
            document.getElementById('totalCount').textContent = certificates.length + ' طلب';

            if (certificates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-cell">لا توجد طلبات</td></tr>';
                return;
            }

            tbody.innerHTML = certificates.map((cert, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>
                        <strong>${cert.owner_firstname || ''} ${cert.owner_lastname || ''}</strong>
                        <div style="font-size: 0.85em; color: gray;">${cert.owner_father ? 'بن ' + cert.owner_father : ''}</div>
                    </td>
                    <td>${cert.owner_birthplace || '-'}</td>
                    <td>${cert.type || 'جديدة'}</td>
                    <td><span class="status-badge status-${cert.status}">${getStatusLabel(cert.status)}</span></td>
                    <td>${formatDate(cert.created_at)}</td>
                    <td>
                        <div class="actions-group">
                            <button class="action-btn action-edit" onclick="openEditModal('${cert.id}')" title="تعديل">✏️</button>
                            <button class="action-btn action-delete" onclick="deleteCertificate('${cert.id}')" title="حذف">🗑️</button>
                            ${cert.status === 'pending' ? `
                                <button class="action-btn action-approve" onclick="updateStatus('${cert.id}', 'approved')" title="موافقة">✓</button>
                                <button class="action-btn action-reject" onclick="updateStatus('${cert.id}', 'rejected')" title="رفض">✗</button>
                            ` : ''}
                            ${cert.status === 'approved' ? `
                                <button class="action-btn action-extract" onclick="updateStatus('${cert.id}', 'extracted')" title="استخراج">📜</button>
                                <button class="action-btn action-print" onclick="printCertificate('${cert.id}')" title="طباعة">🖨️</button>
                            ` : ''}
                            ${cert.status === 'extracted' ? `
                                <button class="action-btn action-print" onclick="printCertificate('${cert.id}')" title="طباعة">🖨️</button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.updateStatus = async function (id, status) {
            if (confirm('هل أنت متأكد من تغيير الحالة؟')) {
                try {
                    // استخدام Laravel API
                    const response = await fetch(`/admin/certificates/${id}/${status}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        // تحديث Firebase أيضاً
                        await FirebaseService.updateCertificateStatus(id, status);
                        loadCertificates();
                    } else {
                        alert('حدث خطأ في تحديث الحالة');
                    }
                } catch (error) {
                    console.error('Error updating status:', error);
                    // fallback إلى Firebase فقط
                    await FirebaseService.updateCertificateStatus(id, status);
                    loadCertificates();
                }
            }
        };

        window.printCertificate = function(id) {
            window.open(`print-certificate.html?id=${id}`, '_blank');
        };

        window.deleteCertificate = async function (id) {
            if (confirm('هل أنت متأكد من حذف هذا الطلب نهائياً؟')) {
                try {
                    const result = await FirebaseService.deleteCertificate(id);
                    if (result.success) {
                        loadCertificates();
                    } else {
                        alert('حدث خطأ أثناء الحذف: ' + (result.error || 'غير معروف'));
                    }
                } catch (e) {
                    alert('خطأ برمجي أثناء الحذف: ' + e.message);
                    console.error(e);
                }
            }
        };

        window.openEditModal = function (id) {
            try {
                const cert = allCertificates.find(c => c.id === id);
                if (!cert) {
                    console.error('Certificate not found for ID:', id);
                    return;
                }

                document.getElementById('edit_id').value = id;
                document.getElementById('edit_owner_lastname').value = cert.owner_lastname || '';
                document.getElementById('edit_owner_firstname').value = cert.owner_firstname || '';
                document.getElementById('edit_owner_father').value = cert.owner_father || '';
                document.getElementById('edit_owner_birthdate').value = cert.owner_birthdate || '';
                document.getElementById('edit_owner_birthplace').value = cert.owner_birthplace || '';
                document.getElementById('edit_phone').value = cert.phone || '';
                document.getElementById('edit_email').value = cert.email || '';
                document.getElementById('edit_status').value = cert.status || 'pending';

                document.getElementById('editModal').classList.add('active');
            } catch (e) {
                alert('حدث خطأ في فتح نافذة التعديل: ' + e.message);
                console.error(e);
            }
        };

        window.saveCertificate = async function (e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const data = {
                owner_lastname: document.getElementById('edit_owner_lastname').value,
                owner_firstname: document.getElementById('edit_owner_firstname').value,
                owner_father: document.getElementById('edit_owner_father').value,
                owner_birthdate: document.getElementById('edit_owner_birthdate').value,
                owner_birthplace: document.getElementById('edit_owner_birthplace').value,
                phone: document.getElementById('edit_phone').value,
                email: document.getElementById('edit_email').value,
                status: document.getElementById('edit_status').value
            };

            try {
                const result = await FirebaseService.updateCertificate(id, data);
                if (result.success) {
                    document.getElementById('editModal').classList.remove('active');
                    loadCertificates();
                } else {
                    alert('حدث خطأ أثناء الحفظ: ' + (result.error || 'غير معروف'));
                }
            } catch (e) {
                alert('خطأ برمجي أثناء الحفظ: ' + e.message);
                console.error(e);
            }
        };

        window.closeModal = function (e) {
            if (e && e.target !== document.getElementById('editModal') && !e.target.classList.contains('close-modal') && !e.target.classList.contains('btn')) return;
            document.getElementById('editModal').classList.remove('active');
        };

        function getStatusLabel(status) {
            const labels = {
                'pending': 'قيد الانتظار',
                'processing': 'قيد المعالجة',
                'approved': 'تمت الموافقة',
                'rejected': 'مرفوض',
                'extracted': 'تم الاستخراج'
            };
            return labels[status] || status || 'غير محدد';
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-DZ');
        }

        window.handleLogout = async function () {
            await FirebaseService.logout();
            window.location.href = 'login.html';
        };
    </script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>

    <style>
        .filters-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filters-bar select,
        .filters-bar input {
            padding: 10px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-family: inherit;
        }

        .filters-bar input {
            flex: 1;
        }

        .total-count {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .actions-group {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .action-edit {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
        }

        .action-edit:hover {
            background: #d97706;
            color: white;
        }

        .action-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .action-delete:hover {
            background: #ef4444;
            color: white;
        }

        .action-approve {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .action-approve:hover {
            background: #10b981;
            color: white;
        }

        .action-reject {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .action-reject:hover {
            background: #ef4444;
            color: white;
        }

        .action-extract {
            background: rgba(59, 130, 246, 0.1);
            color: #2563eb;
        }

        .action-extract:hover {
            background: #3b82f6;
            color: white;
        }

        .action-print {
            background: rgba(139, 69, 19, 0.1);
            color: #8b4513;
        }

        .action-print:hover {
            background: #8b4513;
            color: white;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: white;
            padding: 24px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--gray-700);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</body>

</html>
