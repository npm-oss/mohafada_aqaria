<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشهادات السلبية - المحافظة العقارية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon">🏛️</span>
            <span class="logo-text">المحافظة العقارية</span>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span>لوحة التحكم</span>
            </a>
            <a href="certificates.html" class="nav-item active">
                <span class="nav-icon">📜</span>
                <span>الشهادات السلبية</span>
            </a>
            <a href="documents.html" class="nav-item">
                <span class="nav-icon">📄</span>
                <span>طلبات الوثائق</span>
            </a>
            <a href="messages.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>الرسائل</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="logout-btn" onclick="handleLogout()">
                <span>🚪</span>
                <span>تسجيل الخروج</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>📜 الشهادات السلبية</h1>
            <div class="user-info">
                <span class="user-avatar">👨‍💼</span>
                <span class="user-name" id="userName">المدير</span>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- Filters -->
            <div class="filters-bar">
                <select id="statusFilter" onchange="filterData()">
                    <option value="">كل الحالات</option>
                    <option value="pending">قيد الانتظار</option>
                    <option value="approved">تمت الموافقة</option>
                    <option value="rejected">مرفوض</option>
                    <option value="extracted">تم الاستخراج</option>
                </select>
                <input type="text" id="searchInput" placeholder="🔍 بحث..." onkeyup="filterData()">
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>قائمة الطلبات</h2>
                    <span class="total-count" id="totalCount">0 طلب</span>
                </div>
                <div class="card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>صاحب الشهادة</th>
                                <th>مقدم الطلب</th>
                                <th>البريد / الهاتف</th>
                                <th>النوع</th>
                                <th>الحالة</th>
                                <th>التاريخ</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="certificatesTable">
                            <tr>
                                <td colspan="8" class="loading-cell">
                                    <div class="loading-spinner"></div>
                                    جاري التحميل...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { FirebaseService } from '../js/firebase-config.js';

        let allCertificates = [];

        FirebaseService.onAuthChange((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userName').textContent = user.email.split('@')[0];
                loadCertificates();
            }
        });

        async function loadCertificates() {
            allCertificates = await FirebaseService.getNegativeCertificates();
            displayCertificates(allCertificates);
        }

        window.filterData = function () {
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allCertificates;

            if (status) {
                filtered = filtered.filter(c => c.status === status);
            }

            if (search) {
                filtered = filtered.filter(c =>
                    (c.owner_lastname || '').toLowerCase().includes(search) ||
                    (c.owner_firstname || '').toLowerCase().includes(search) ||
                    (c.email || '').toLowerCase().includes(search)
                );
            }

            displayCertificates(filtered);
        };

        function displayCertificates(certificates) {
            const tbody = document.getElementById('certificatesTable');
            document.getElementById('totalCount').textContent = certificates.length + ' طلب';

            if (certificates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-cell">لا توجد طلبات</td></tr>';
                return;
            }

            tbody.innerHTML = certificates.map((cert, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${cert.owner_firstname || ''} ${cert.owner_lastname || ''}</strong><br><small>${cert.owner_father ? 'بن ' + cert.owner_father : ''}</small></td>
                    <td>${cert.applicant_firstname || '-'} ${cert.applicant_lastname || ''}</td>
                    <td>${cert.email || '-'}<br><small dir="ltr">${cert.phone || ''}</small></td>
                    <td>${cert.type || 'جديدة'}</td>
                    <td><span class="status-badge status-${cert.status}">${getStatusLabel(cert.status)}</span></td>
                    <td>${formatDate(cert.created_at)}</td>
                    <td>
                        <button class="action-btn action-approve" onclick="updateStatus('${cert.id}', 'approved')" title="موافقة">✓</button>
                        <button class="action-btn action-reject" onclick="updateStatus('${cert.id}', 'rejected')" title="رفض">✗</button>
                        <button class="action-btn action-extract" onclick="updateStatus('${cert.id}', 'extracted')" title="استخراج">📜</button>
                    </td>
                </tr>
            `).join('');
        }

        window.updateStatus = async function (id, status) {
            await FirebaseService.updateCertificateStatus(id, status);
            loadCertificates();
        };

        function getStatusLabel(status) {
            const labels = {
                'pending': 'قيد الانتظار',
                'processing': 'قيد المعالجة',
                'approved': 'تمت الموافقة',
                'rejected': 'مرفوض',
                'extracted': 'تم الاستخراج'
            };
            return labels[status] || status || 'غير محدد';
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-DZ');
        }

        window.handleLogout = async function () {
            await FirebaseService.logout();
            window.location.href = 'login.html';
        };
    </script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>

    <style>
        .filters-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .filters-bar select,
        .filters-bar input {
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 1rem;
        }

        .filters-bar input {
            flex: 1;
        }

        .total-count {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .action-approve {
            background: rgba(16, 185, 129, 0.1) !important;
            color: #059669 !important;
        }

        .action-approve:hover {
            background: #10b981 !important;
            color: white !important;
        }

        .action-reject {
            background: rgba(239, 68, 68, 0.1) !important;
            color: #dc2626 !important;
        }

        .action-reject:hover {
            background: #ef4444 !important;
            color: white !important;
        }

        .action-extract {
            background: rgba(59, 130, 246, 0.1) !important;
            color: #2563eb !important;
        }

        .action-extract:hover {
            background: #3b82f6 !important;
            color: white !important;
        }
    </style>
</body>

</html>
