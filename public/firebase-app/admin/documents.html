<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات الوثائق - المحافظة العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><span class="logo-icon">🏛️</span><span class="logo-text">المحافظة العقارية</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
            <a href="certificates.html" class="nav-item"><span class="nav-icon">📜</span><span>الشهادات
                    السلبية</span></a>
            <a href="documents.html" class="nav-item active"><span class="nav-icon">📄</span><span>طلبات
                    الوثائق</span></a>
            <a href="messages.html" class="nav-item"><span class="nav-icon">💬</span><span>الرسائل</span></a>
        </nav>
        <div class="sidebar-footer"><button class="logout-btn"
                onclick="handleLogout()"><span>🚪</span><span>خروج</span></button></div>
    </aside>
    <main class="main-content">
        <header class="topbar"><button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>📄 طلبات الوثائق</h1>
        </header>
        <div class="dashboard-content">
            <div class="filters-bar">
                <select id="typeFilter" onchange="filterData()">
                    <option value="">كل الأنواع</option>
                    <option value="personal">البطاقة الشخصية</option>
                    <option value="alphabetical">البطاقة الأبجدية</option>
                    <option value="urban">البطاقة الحضرية</option>
                    <option value="rural">البطاقة الريفية</option>
                    <option value="contract">مستخرج عقد</option>
                </select>
                <select id="statusFilter" onchange="filterData()">
                    <option value="">كل الحالات</option>
                    <option value="pending">قيد الانتظار</option>
                    <option value="approved">تمت الموافقة</option>
                    <option value="rejected">مرفوض</option>
                </select>
                <input type="text" id="searchInput" placeholder="🔍 بحث..." onkeyup="filterData()">
            </div>
            <div class="card">
                <div class="card-header">
                    <h2>قائمة الطلبات</h2><span class="total-count" id="totalCount">0 طلب</span>
                </div>
                <div class="card-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>مقدم الطلب</th>
                                <th>النوع</th>
                                <th>البلدية</th>
                                <th>الحالة</th>
                                <th>التاريخ</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="documentsTable">
                            <tr>
                                <td colspan="7" class="loading-cell">
                                    <div class="loading-spinner"></div>جاري التحميل...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script type="module">
        import { FirebaseService, db } from '../js/firebase-config.js';
        import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        let allDocs = [];
        FirebaseService.onAuthChange(u => { if (!u) window.location.href = 'login.html'; else loadDocs(); });
        async function loadDocs() { allDocs = await FirebaseService.getDocumentRequests(); displayDocs(allDocs); }
        window.filterData = function () {
            let f = allDocs;
            const t = document.getElementById('typeFilter').value;
            const s = document.getElementById('statusFilter').value;
            const q = document.getElementById('searchInput').value.toLowerCase();
            if (t) f = f.filter(d => d.card_type === t || d.request_type === t);
            if (s) f = f.filter(d => d.status === s);
            if (q) f = f.filter(d => (d.applicant_lastname || '').toLowerCase().includes(q));
            displayDocs(f);
        };
        function displayDocs(docs) {
            const tb = document.getElementById('documentsTable');
            document.getElementById('totalCount').textContent = docs.length + ' طلب';
            if (!docs.length) { tb.innerHTML = '<tr><td colspan="7" class="empty-cell">لا توجد طلبات</td></tr>'; return; }
            tb.innerHTML = docs.map((d, i) => `<tr><td>${i + 1}</td><td>${d.applicant_firstname || ''} ${d.applicant_lastname || ''}</td><td>${d.card_type_ar || d.request_type_ar || d.card_type || '-'}</td><td>${d.municipality || '-'}</td><td><span class="status-badge status-${d.status}">${{ 'pending': 'انتظار', 'approved': 'موافقة', 'rejected': 'مرفوض' }[d.status] || d.status || '-'}</span></td><td>${d.created_at ? new Date(d.created_at).toLocaleDateString('ar-DZ') : '-'}</td><td><button class="action-btn" onclick="updateS('${d.id}','approved')">✓</button><button class="action-btn" onclick="updateS('${d.id}','rejected')">✗</button></td></tr>`).join('');
        }
        window.updateS = async function (id, s) { await updateDoc(doc(db, 'documents_requests', id), { status: s, updated_at: new Date().toISOString() }); loadDocs(); };
        window.handleLogout = async function () { await FirebaseService.logout(); window.location.href = 'login.html'; };
    </script>
    <script>function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }</script>
    <style>
        .filters-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .filters-bar select,
        .filters-bar input {
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-family: inherit
        }

        .filters-bar input {
            flex: 1
        }

        .total-count {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: .9rem
        }
    </style>
</body>

</html>
