<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرسائل - المحافظة العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><span class="logo-icon">🏛️</span><span class="logo-text">المحافظة العقارية</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
            <a href="certificates.html" class="nav-item"><span class="nav-icon">📜</span><span>الشهادات
                    السلبية</span></a>
            <a href="documents.html" class="nav-item"><span class="nav-icon">📄</span><span>طلبات الوثائق</span></a>
            <a href="messages.html" class="nav-item active"><span class="nav-icon">💬</span><span>الرسائل</span></a>
        </nav>
        <div class="sidebar-footer"><button class="logout-btn"
                onclick="handleLogout()"><span>🚪</span><span>خروج</span></button></div>
    </aside>
    <main class="main-content">
        <header class="topbar"><button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>💬 الرسائل</h1>
        </header>
        <div class="dashboard-content">
            <div class="card">
                <div class="card-header">
                    <h2>جميع الرسائل</h2><span class="total-count" id="totalCount">0</span>
                </div>
                <div class="card-body">
                    <div class="messages-list" id="messagesList">
                        <div class="loading-cell">
                            <div class="loading-spinner"></div>جاري التحميل...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script type="module">
        import { FirebaseService, db } from '../js/firebase-config.js';
        import { doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        FirebaseService.onAuthChange(u => { if (!u) window.location.href = 'login.html'; else loadMessages(); });
        async function loadMessages() {
            const msgs = await FirebaseService.getContacts();
            document.getElementById('totalCount').textContent = msgs.length + ' رسالة';
            const list = document.getElementById('messagesList');
            if (!msgs.length) { list.innerHTML = '<div class="empty-cell">لا توجد رسائل</div>'; return; }
            list.innerHTML = msgs.map(m => `
                <div class="message-card ${m.read ? '' : 'unread'}" onclick="markRead('${m.id}')">
                    <div class="msg-header">
                        <div class="msg-avatar">${(m.name || 'م').charAt(0)}</div>
                        <div class="msg-info">
                            <strong>${m.name || 'مجهول'}</strong>
                            <span class="msg-subject">${m.subject || 'بدون موضوع'}</span>
                        </div>
                        <span class="msg-date">${m.created_at ? new Date(m.created_at).toLocaleDateString('ar-DZ') : '-'}</span>
                    </div>
                    <div class="msg-body"><p>${m.message || ''}</p></div>
                    <div class="msg-footer">
                        <span>📧 ${m.email || '-'}</span>
                        <span dir="ltr">📞 ${m.phone || '-'}</span>
                        <button class="del-btn" onclick="event.stopPropagation();delMsg('${m.id}')">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }
        window.markRead = async function (id) { await updateDoc(doc(db, 'contacts', id), { read: true }); };
        window.delMsg = async function (id) { if (confirm('هل تريد حذف هذه الرسالة؟')) { await deleteDoc(doc(db, 'contacts', id)); loadMessages(); } };
        window.handleLogout = async function () { await FirebaseService.logout(); window.location.href = 'login.html'; };
    </script>
    <script>function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }</script>
    <style>
        .message-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--gray-200);
            cursor: pointer;
            transition: var(--transition)
        }

        .message-card:hover {
            box-shadow: var(--shadow)
        }

        .message-card.unread {
            border-right: 4px solid var(--primary);
            background: rgba(59, 130, 246, .02)
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px
        }

        .msg-avatar {
            width: 48px;
            height: 48px;
            background: var(--gradient-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem
        }

        .msg-info {
            flex: 1
        }

        .msg-info strong {
            display: block;
            color: var(--dark)
        }

        .msg-subject {
            color: var(--gray-500);
            font-size: .9rem
        }

        .msg-date {
            color: var(--gray-500);
            font-size: .85rem
        }

        .msg-body {
            padding: 16px;
            background: var(--gray-100);
            border-radius: var(--radius-sm);
            margin-bottom: 12px
        }

        .msg-body p {
            color: var(--gray-700);
            line-height: 1.7
        }

        .msg-footer {
            display: flex;
            gap: 20px;
            color: var(--gray-500);
            font-size: .9rem;
            align-items: center
        }

        .del-btn {
            margin-right: auto;
            background: rgba(239, 68, 68, .1);
            color: #dc2626;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer
        }

        .del-btn:hover {
            background: #ef4444;
            color: white
        }

        .total-count {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: .9rem
        }
    </style>
</body>

</html>
