<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرسائل - المحافظة العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><span class="logo-icon">🏛️</span><span class="logo-text">المحافظة العقارية</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
            <a href="certificates.html" class="nav-item"><span class="nav-icon">📜</span><span>الشهادات
                    السلبية</span></a>
            <a href="documents.html" class="nav-item"><span class="nav-icon">📄</span><span>طلبات الوثائق</span></a>
            <a href="messages.html" class="nav-item active"><span class="nav-icon">💬</span><span>الرسائل</span></a>
        </nav>
        <div class="sidebar-footer"><button class="logout-btn"
                onclick="handleLogout()"><span>🚪</span><span>خروج</span></button></div>
    </aside>
    <main class="main-content">
        <header class="topbar"><button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>💬 الرسائل</h1>
        </header>
        <div class="dashboard-content">
            <!-- Filter Bar -->
            <div class="filters-bar">
                <input type="date" id="dateFilter" onchange="filterData()" placeholder="تاريخ">
                <input type="text" id="searchInput" placeholder="🔍 بحث (الاسم، البريد، الموضوع)..."
                    onkeyup="filterData()">
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>جميع الرسائل</h2><span class="total-count" id="totalCount">0</span>
                </div>
                <div class="card-body">
                    <div class="messages-list" id="messagesList">
                        <div class="loading-cell">
                            <div class="loading-spinner"></div>جاري التحميل...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Message Details Modal -->
        <div id="modalOverlay" class="modal-overlay" onclick="closeModal(event)">
            <div class="modal">
                <div class="modal-header">
                    <h2>تفاصيل الرسالة</h2>
                    <button class="close-modal" onclick="closeModal()">×</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Content will be injected -->
                </div>
            </div>
        </div>

        <!-- Edit Message Modal -->
        <div id="editMessageModal" class="modal-overlay" onclick="closeEditModal(event)">
            <div class="modal">
                <div class="modal-header">
                    <h2>تعديل الرسالة</h2>
                    <button class="close-modal" onclick="closeEditModal()">×</button>
                </div>
                <div class="modal-body">
                    <form id="editMessageForm" onsubmit="saveMessage(event)">
                        <input type="hidden" id="edit_msg_id">
                        <div class="form-group">
                            <label>الاسم</label>
                            <input type="text" id="edit_msg_name" required>
                        </div>
                        <div class="form-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="edit_msg_email" required>
                        </div>
                        <div class="form-group">
                            <label>الهاتف</label>
                            <input type="text" id="edit_msg_phone" dir="ltr">
                        </div>
                        <div class="form-group">
                            <label>الموضوع</label>
                            <input type="text" id="edit_msg_subject" required>
                        </div>
                        <div class="form-group">
                            <label>الرسالة</label>
                            <textarea id="edit_msg_content" rows="4"
                                style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
                        </div>
                        <div class="form-actions" style="margin-top: 20px; display: flex; gap: 10px;">
                            <button type="submit" class="btn btn-primary"
                                style="flex: 1; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px;">حفظ
                                التعديلات</button>
                            <button type="button" onclick="closeEditModal()" class="btn"
                                style="flex: 1; padding: 10px; background: #e5e7eb; border: none; border-radius: 4px;">إلغاء</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script type="module">
        import { FirebaseService } from '../js/firebase-config.js';
        import { ref, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        import { db } from '../js/firebase-config.js'; // Ensure db is exported or re-initialized if accessible

        let allMessages = [];

        FirebaseService.onAuthChange(u => { if (!u) window.location.href = 'login.html'; else loadMessages(); });

        async function loadMessages() {
            try {
                allMessages = await FirebaseService.getContacts();
                displayMessages(allMessages);
            } catch (e) {
                console.error(e);
                alert("حدث خطأ أثناء تحميل الرسائل: " + e.message);
            }
        }

        window.filterData = function () {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const date = document.getElementById('dateFilter').value;

            let filtered = allMessages;

            if (search) {
                filtered = filtered.filter(m =>
                    (m.name || '').toLowerCase().includes(search) ||
                    (m.email || '').toLowerCase().includes(search) ||
                    (m.subject || '').toLowerCase().includes(search)
                );
            }

            if (date) {
                filtered = filtered.filter(m => {
                    if (!m.created_at) return false;
                    return m.created_at.startsWith(date);
                });
            }

            displayMessages(filtered);
        };

        function displayMessages(msgs) {
            document.getElementById('totalCount').textContent = msgs.length + ' رسالة';
            const list = document.getElementById('messagesList');
            if (!msgs.length) { list.innerHTML = '<div class="empty-cell">لا توجد رسائل</div>'; return; }
            list.innerHTML = msgs.map(m => `
                <div class="message-card ${m.read ? '' : 'unread'}" onclick="openMessage('${m.id}')">
                    <div class="msg-header">
                        <div class="msg-avatar">${(m.name || 'م').charAt(0)}</div>
                        <div class="msg-info">
                            <strong>${m.name || 'مجهول'}</strong>
                            <span class="msg-subject">${m.subject || 'بدون موضوع'}</span>
                        </div>
                        <span class="msg-date">${m.created_at ? new Date(m.created_at).toLocaleDateString('ar-DZ') : '-'}</span>
                    </div>
                    <div class="msg-preview"><p>${(m.message || '').substring(0, 100)}${(m.message || '').length > 100 ? '...' : ''}</p></div>
                    <div class="msg-footer">
                        <button class="action-btn action-view" onclick="event.stopPropagation();openMessage('${m.id}')" title="عرض التفاصيل">👁️ عرض</button>
                        <button class="action-btn action-edit" onclick="event.stopPropagation();openEditMessage('${m.id}')" title="تعديل">✏️ تعديل</button>
                        <button class="action-btn action-delete" onclick="event.stopPropagation();delMsg('${m.id}')" title="حذف">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        window.openMessage = async function (id) {
            try {
                const m = allMessages.find(msg => msg.id === id);
                if (!m) return;

                // Mark as read
                if (!m.read) {
                    await FirebaseService.updateContactReadStatus(id, true);
                    m.read = true;
                    displayMessages(allMessages); // Refresh UI
                }

                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <div class="detail-row"><strong>الاسم:</strong> <span>${m.name}</span></div>
                    <div class="detail-row"><strong>البريد:</strong> <span>${m.email}</span></div>
                    <div class="detail-row"><strong>الهاتف:</strong> <span dir="ltr">${m.phone || '-'}</span></div>
                    <div class="detail-row"><strong>الموضوع:</strong> <span>${m.subject}</span></div>
                    <div class="detail-row"><strong>التاريخ:</strong> <span>${m.created_at ? new Date(m.created_at).toLocaleString('ar-DZ') : '-'}</span></div>
                    <hr>
                    <div class="detail-content">
                        <strong>الرسالة:</strong>
                        <p>${m.message}</p>
                    </div>
                `;
                document.getElementById('modalOverlay').classList.add('active');
            } catch (e) {
                alert("خطأ في فتح الرسالة: " + e.message);
            }
        };

        window.openEditMessage = function (id) {
            const m = allMessages.find(msg => msg.id === id);
            if (!m) return;

            document.getElementById('edit_msg_id').value = id;
            document.getElementById('edit_msg_name').value = m.name || '';
            document.getElementById('edit_msg_email').value = m.email || '';
            document.getElementById('edit_msg_phone').value = m.phone || '';
            document.getElementById('edit_msg_subject').value = m.subject || '';
            document.getElementById('edit_msg_content').value = m.message || '';

            document.getElementById('editMessageModal').classList.add('active');
        };

        window.saveMessage = async function (e) {
            e.preventDefault();
            const id = document.getElementById('edit_msg_id').value;
            const data = {
                name: document.getElementById('edit_msg_name').value,
                email: document.getElementById('edit_msg_email').value,
                phone: document.getElementById('edit_msg_phone').value,
                subject: document.getElementById('edit_msg_subject').value,
                message: document.getElementById('edit_msg_content').value
            };

            try {
                const result = await FirebaseService.updateContact(id, data);
                if (result.success) {
                    document.getElementById('editMessageModal').classList.remove('active');
                    loadMessages();
                } else {
                    alert("خطأ في حفظ التعديلات: " + (result.error || 'غير معروف'));
                }
            } catch (err) {
                alert("خطأ في حفظ التعديلات: " + err.message);
                console.error(err);
            }
        };

        window.closeModal = function (e) {
            if (e && e.target !== document.getElementById('modalOverlay') && !e.target.classList.contains('close-modal')) return;
            document.getElementById('modalOverlay').classList.remove('active');
        };

        window.closeEditModal = function (e) {
            if (e && e.target !== document.getElementById('editMessageModal') && !e.target.classList.contains('close-modal') && !e.target.classList.contains('btn')) return;
            document.getElementById('editMessageModal').classList.remove('active');
        }

        window.delMsg = async function (id) {
            if (confirm('هل تريد حذف هذه الرسالة؟')) {
                try {
                    const result = await FirebaseService.deleteContact(id);
                    if (result.success) {
                        loadMessages();
                    } else {
                        alert('حدث خطأ أثناء الحذف: ' + (result.error || 'غير معروف'));
                    }
                } catch (e) {
                    alert('خطأ برمجي أثناء الحذف: ' + e.message);
                    console.error(e);
                }
            }
        };

        window.handleLogout = async function () { await FirebaseService.logout(); window.location.href = 'login.html'; };
    </script>
    <script>function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }</script>
    <style>
        .filters-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .filters-bar input {
            padding: 10px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
        }

        .filters-bar #searchInput {
            flex: 1;
        }

        .message-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--gray-200);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .message-card:hover {
            box-shadow: var(--shadow)
        }

        .message-card.unread {
            border-right: 4px solid var(--primary);
            background: rgba(59, 130, 246, .02)
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px
        }

        .msg-avatar {
            width: 48px;
            height: 48px;
            background: var(--gradient-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem
        }

        .msg-info {
            flex: 1
        }

        .msg-info strong {
            display: block;
            color: var(--dark)
        }

        .msg-subject {
            color: var(--gray-500);
            font-size: .9rem
        }

        .msg-date {
            color: var(--gray-500);
            font-size: .85rem
        }

        .msg-preview {
            color: var(--gray-600);
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .msg-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .action-btn {
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }

        .action-view {
            background: rgba(59, 130, 246, .1);
            color: #2563eb;
        }

        .action-view:hover {
            background: #3b82f6;
            color: white;
        }

        .action-edit {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
        }

        .action-edit:hover {
            background: #d97706;
            color: white;
        }

        .action-delete {
            background: rgba(239, 68, 68, .1);
            color: #dc2626;
        }

        .action-delete:hover {
            background: #ef4444;
            color: white;
        }

        .total-count {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: .9rem
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: white;
            padding: 24px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
            padding-bottom: 10px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .detail-row {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .detail-content {
            margin-top: 16px;
        }

        .detail-content p {
            background: var(--gray-100);
            padding: 15px;
            border-radius: var(--radius-sm);
            margin-top: 8px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</body>

</html>
